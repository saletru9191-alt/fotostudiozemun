<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fotostudiozemun</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-image: url('jjj.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      background: rgba(10,10,10,0.6);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 30px;
      padding: 25px 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 4px solid rgba(255,255,255,0.15);
    }

    h1 {
      color: white;
      font-size: 40px;
      margin-bottom: 15px;
      font-weight: bold;
      text-transform: lowercase;
      word-break: break-word;
      line-height: 1.2;
    }

    .subtitle {
      color: #d0d0d0;
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 25px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 18px 20px;
      margin-bottom: 15px;
      font-size: 20px;
      transition: 0.3s;
    }

    .link:hover {
      background: rgba(255,255,255,0.1);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .icon {
      width: 28px;
      text-align: center;
      font-size: 26px;
    }

    .arrow {
      font-size: 24px;
      color: #cccccc;
    }

    footer {
      margin-top: 20px;
      color: #888;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .card {
        padding: 20px 15px;
        border-radius: 25px;
      }

      h1 {
        font-size: 30px;
      }

      .subtitle {
        font-size: 15px;
      }

      .link {
        font-size: 18px;
        padding: 16px;
      }

      .profile-img {
        width: 100px;
        height: 100px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="profilna.png" alt="Profilna Slika" class="profile-img">

    <h1>fotostudiozemun</h1>

    <p class="subtitle">

      Javite nam se na vreme i rezervišite svoj termin.
    </p>
